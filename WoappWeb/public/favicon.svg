<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- Modern gradient definitions -->
  <defs>
    <!-- Vibrant Orange Gradient -->
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff7e40" />
      <stop offset="50%" stop-color="#ff5100" />
      <stop offset="100%" stop-color="#d93b00" />
    </linearGradient>
    
    <!-- Chrome / Steel Gradient for the Bar -->
    <linearGradient id="steelGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#707a8a" />
      <stop offset="30%" stop-color="#cfd6df" />
      <stop offset="50%" stop-color="#ffffff" />
      <stop offset="70%" stop-color="#b1b9c4" />
      <stop offset="100%" stop-color="#505866" />
    </linearGradient>

    <!-- Dark Iron/Collar Gradient -->
    <linearGradient id="ironGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#374151" />
      <stop offset="100%" stop-color="#111827" />
    </linearGradient>
    
    <!-- Shadow for Depth -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#000000" flood-opacity="0.5" />
    </filter>
  </defs>
  
  <!-- Entire Dumbbell rotated at -45deg centered in 512x512 -->
  <g transform="translate(256, 256) rotate(-45) translate(-256, -256)" filter="url(#shadow)">
    <!-- Central Bar -->
    <rect x="110" y="236" width="292" height="40" rx="8" fill="url(#steelGrad)" />
    
    <!-- Knurling details (textured grip in the middle) -->
    <path d="M 190 236 L 322 236 L 322 276 L 190 276 Z" fill="#475569" opacity="0.15" />
    <path d="M 190 236 L 322 276 M 200 236 L 322 272 M 190 240 L 302 276 M 220 236 L 322 268 M 190 248 L 282 276 M 240 236 L 322 264 M 190 256 L 262 276" stroke="#ffffff" stroke-width="1" opacity="0.25" stroke-dasharray="2 2" />
    
    <!-- Left Inner Collar -->
    <rect x="150" y="196" width="22" height="120" rx="8" fill="url(#ironGrad)" stroke="#4b5563" stroke-width="1" />
    
    <!-- Left Plate 1 (Large Orange) -->
    <rect x="100" y="136" width="42" height="240" rx="16" fill="url(#orangeGrad)" stroke="#ea580c" stroke-width="1.5" />
    
    <!-- Left Plate 2 (Medium Orange) -->
    <rect x="50" y="166" width="42" height="180" rx="14" fill="url(#orangeGrad)" stroke="#ea580c" stroke-width="1.5" />
    
    <!-- Left Outer Cap/End Bolt -->
    <rect x="34" y="231" width="16" height="50" rx="6" fill="url(#ironGrad)" stroke="#4b5563" stroke-width="1" />
    <circle cx="26" cy="256" r="10" fill="url(#steelGrad)" />

    <!-- Right Inner Collar -->
    <rect x="340" y="196" width="22" height="120" rx="8" fill="url(#ironGrad)" stroke="#4b5563" stroke-width="1" />
    
    <!-- Right Plate 1 (Large Orange) -->
    <rect x="370" y="136" width="42" height="240" rx="16" fill="url(#orangeGrad)" stroke="#ea580c" stroke-width="1.5" />
    
    <!-- Right Plate 2 (Medium Orange) -->
    <rect x="420" y="166" width="42" height="180" rx="14" fill="url(#orangeGrad)" stroke="#ea580c" stroke-width="1.5" />
    
    <!-- Right Outer Cap/End Bolt -->
    <rect x="462" y="231" width="16" height="50" rx="6" fill="url(#ironGrad)" stroke="#4b5563" stroke-width="1" />
    <circle cx="486" cy="256" r="10" fill="url(#steelGrad)" />
  </g>
</svg>